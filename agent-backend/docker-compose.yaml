services:
  agent-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldagent-backend
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - backend-data:/app/data

volumes:
  backend-data:
